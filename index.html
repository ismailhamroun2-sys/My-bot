<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أشنو واقع - المنصة الإخبارية العالمية</title>
    <style>
        /* CSS الخاص بالموقع غانحطوه هنا تحت هذا التعليق */
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --accent: #d32f2f;
            --text-main: #ffffff;
            --gold: #ffc107;
        }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: sans-serif; margin: 0; }
        header { background: #000; padding: 20px; text-align: center; border-bottom: 3px solid var(--accent); }
        .nav-brand { font-size: 2rem; font-weight: 900; color: var(--accent); }
        #news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 20px; }
        .news-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .news-card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 15px; }
        .btn-details { display: inline-block; padding: 10px 20px; background: var(--accent); color: #fff; text-decoration: none; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="nav-brand">أشنو واقع</div>
    </header>
    <main>
        <!-- هنا غانزيدو الأخبار في الأجزاء الجاية -->
        <div id="news-grid"></div>
    </main>
    <!-- قسم المباريات اليوم 29 يونيو -->
    <section style="padding: 20px; background: #111; border-bottom: 2px solid #222;">
        <h2 style="text-align: center; color: var(--gold); margin-bottom: 15px;">مباريات اليوم 29 يونيو 2026</h2>
        <div style="display: flex; justify-content: center; align-items: center; gap: 20px; font-weight: bold;">
            <div style="text-align: center;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/2c/Flag_of_Morocco.svg" width="50" alt="المغرب">
                <p>المغرب</p>
            </div>
            <div style="font-size: 1.5rem;">VS</div>
            <div style="text-align: center;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/fd/Flag_of_Senegal.svg" width="50" alt="السنغال">
                <p>السنغال</p>
            </div>
        </div>
    </section>
    <script>
        const news = [
            { title: "المغرب يواجه السنغال في قمة إفريقية مرتقبة اليوم", category: "رياضة", img: "https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=800" },
            { title: "الذكاء الاصطناعي يغير قواعد صناعة المحتوى في 2026", category: "تكنولوجيا", img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=800" },
            { title: "أشنو واقع: انطلاقة قوية لمنصة إعلامية جديدة", category: "عاجل", img: "https://images.unsplash.com/photo-1495020689067-fe5881079d39?w=800" }
        ];

        const grid = document.getElementById('news-grid');
        news.forEach(item => {
            grid.innerHTML += `
                <div class="news-card">
                    <img src="${item.img}" alt="خبر">
                    <div class="card-content">
                        <span style="color:var(--accent); font-size: 0.8rem;">${item.category}</span>
                        <h3>${item.title}</h3>
                        <a href="#" class="btn-details">اقرأ التفاصيل</a>
                    </div>
                </div>
            `;
        });
    </script>
    <!-- واجهة التفاصيل المخفية -->
    <div id="detail-page" style="display:none; padding:40px 5%; background:#1a1a1a;">
        <button onclick="document.getElementById('detail-page').style.display='none'; document.getElementById('news-grid').style.display='grid';" class="btn-details">← العودة</button>
        <h1 id="detail-title" style="margin:20px 0;"></h1>
        <img id="detail-img" src="" alt="صورة الخبر" style="width:100%; border-radius:10px;">
        <p style="margin-top:20px; font-size:1.2rem;">هذا المحتوى حصري للمشتركين... (يمكنك إضافة تفاصيل الأخبار هنا)</p>
        <div style="background:#000; padding:30px; text-align:center; margin-top:30px;">
            <p>مساحة إعلانية بريميوم</p>
        </div>
    </div>

    <!-- الفوتر -->
    <footer style="text-align:center; padding:40px; border-top:1px solid #333; margin-top:50px;">
        <p>© 2026 جميع الحقوق محفوظة لمنصة "أشنو واقع"</p>
    </footer>
